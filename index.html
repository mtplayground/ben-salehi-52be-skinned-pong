<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05050b" />
    <title>Skinned Pong</title>
  </head>
  <body>
    <main id="app" class="app-shell" aria-label="Skinned Pong game canvas">
      <section class="canvas-frame" aria-label="Play area">
        <canvas id="game-canvas" aria-label="Skinned Pong play field"></canvas>
      </section>
      <div class="crt-overlay" aria-hidden="true"></div>
      <aside class="score-hud" aria-label="Current score" aria-live="polite">
        <span class="score-side score-side--player">
          <span class="score-label">Player</span>
          <span id="player-score" class="score-value">0</span>
        </span>
        <span class="score-divider" aria-hidden="true">:</span>
        <span class="score-side score-side--opponent">
          <span id="opponent-score" class="score-value">0</span>
          <span class="score-label">AI</span>
        </span>
      </aside>
      <section
        id="skin-selection-screen"
        class="skin-screen"
        aria-label="Skin selection"
      >
        <div class="skin-screen__panel">
          <div class="skin-screen__header">
            <h1>Skins</h1>
          </div>
          <div id="skin-picker-list" class="skin-grid"></div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
